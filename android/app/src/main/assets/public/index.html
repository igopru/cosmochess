<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#070714">
    <link rel="manifest" href="/manifest.json">
    <title>Шахматный тренажёр</title>
    <link rel="stylesheet" href="vendor/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>♟ Шахматный тренажёр</h1>
        <div id="status">Ход белых</div>
        <div class="board-row">
            <div id="evalBar" class="eval-bar">
                <div id="evalFillWhite" class="eval-fill-white"></div>
                <div id="evalFillBlack" class="eval-fill-black"></div>
                <div class="eval-center"></div>
                <span id="evalText" class="eval-text">0.00</span>
            </div>
            <div id="board"></div>
        </div>
        <div class="controls-row">
            <select id="colorSelect">
                <option value="w">♔ Белые</option>
                <option value="b">♚ Чёрные</option>
            </select>
            <button id="resetBtn">Новая игра</button>
            <button id="flipBtn">Перевернуть</button>
            <button id="dragToggle">🖱 Click</button>
            <button id="reviewBtn">Разобрать партию</button>
        </div>
        <div id="reviewControls" class="review-controls hidden">
            <button id="reviewPrev">&#x23EE;</button>
            <span id="reviewPos">Ход 0/0</span>
            <button id="reviewNext">&#x23ED;</button>
            <button id="reviewExit" class="btn-danger">Выйти</button>
            <div id="reviewInfo" class="review-info"></div>
        </div>
        <div class="controls-row">
            <select id="difficulty">
                <option value="500">Очень легко</option>
                <option value="1000">Легко</option>
                <option value="1500" selected>Сложно</option>
                <option value="2000">Очень сложно</option>
                <option value="2500">Невозможно</option>
            </select>
            <button id="hintBtn">💡 Подсказка</button>
            <button id="copyBtn">Копировать ходы</button>
        </div>
        <div class="training-section">
            <button id="trainingToggle" class="training-toggle">&#x1F393; Обучение</button>
            <div id="trainingPanel" class="training-panel hidden">
                <div class="training-header">
                    <span class="training-title">Режим обучения</span>
                    <label class="hint-label"><input type="checkbox" id="hintCheck" checked> Подсказки</label>
                </div>
                <select id="trainingSelect"></select>
                <div id="groupProgress" class="group-progress hidden"></div>
                <div id="openingDesc" class="opening-desc"></div>
                <div class="progress-bar">
                    <div id="trainingProgress" class="progress-fill" style="width:0%"></div>
                </div>
                <div id="trainingProgressText" class="progress-text">Не начато</div>
                <div id="evalAnnotation" class="training-annotation hidden"></div>
                <div id="moveEval" class="move-eval hidden"></div>
                <div id="trainingHint" class="training-hint hidden"></div>
                <div class="training-actions">
                    <button id="startTrainingBtn" class="training-start">Начать</button>
                    <button id="stopTrainingBtn" class="training-stop" disabled>Выйти</button>
                </div>
                <div class="reset-progress-row">
                    <button id="resetProgressBtn" class="reset-progress-btn">♻ Сбросить прогресс</button>
                </div>
            </div>
        </div>

        <div class="training-section">
            <button id="puzzleToggle" class="training-toggle">&#x1F3AF; Задачи</button>
            <div id="puzzlePanel" class="training-panel hidden">
                <div class="puzzle-filters">
                    <div class="puzzle-filter-row">
                        <label class="puzzle-label">Сложность</label>
                        <select id="puzzleDifficulty">
                            <option value="0-1200">Лёгкие (&lt;1200)</option>
                            <option value="1200-1600">Средние (1200-1600)</option>
                            <option value="1600-2000" selected>Сложные (1600-2000)</option>
                            <option value="2000-9999">Эксперт (&gt;2000)</option>
                            <option value="0-9999">Все</option>
                        </select>
                    </div>
                    <div class="puzzle-filter-row">
                        <label class="puzzle-label">Тема</label>
                        <select id="puzzleTheme">
                            <option value="">Все темы</option>
                        </select>
                    </div>
                </div>
                <div id="puzzleInfo" class="puzzle-info hidden">
                    <div class="puzzle-meta">
                        <span id="puzzleRating" class="puzzle-rating"></span>
                        <span id="puzzleThemes" class="puzzle-themes"></span>
                    </div>
                </div>
                <div class="puzzle-progress hidden" id="puzzleProgress">
                    <div class="progress-bar">
                        <div id="puzzleProgressFill" class="progress-fill" style="width:0%"></div>
                    </div>
                    <div id="puzzleProgressText" class="progress-text"></div>
                </div>
                <div class="training-actions">
                    <button id="getPuzzleBtn" class="training-start">Получить задачу</button>
                    <button id="stopPuzzleBtn" class="training-stop" disabled>Выйти</button>
                </div>
            </div>
        </div>
        <div class="pgn-section">
            <button id="pgnToggle" class="training-toggle">&#x1F4C4; Загрузить PGN</button>
            <div id="pgnPanel" class="training-panel hidden">
                <textarea id="pgnText" class="pgn-input" placeholder="Вставьте PGN партии..."></textarea>
                <button id="pgnLoadBtn" class="training-start">Загрузить</button>
            </div>
        </div>
        <div id="pgn" class="pgn-box"></div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
    </script>
    <script src="vendor/jquery-3.5.1.min.js"></script>
    <script src="vendor/chess-0.10.3.min.js"></script>
    <script src="vendor/chessboard-1.0.0.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
